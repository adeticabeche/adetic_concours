<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Résultat du Concours</title>

<link rel="stylesheet" href="css/style.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#f2f5fa;
text-align:center;
}

.box{

background:#fff;

width:700px;
max-width:95%;

margin:40px auto;

padding:40px 30px;

border-radius:15px;

box-shadow:0 0 15px rgba(0,0,0,.15);

}

h1{

color:#0056b3;
margin-bottom:20px;

}

#nom{
margin-bottom:20px;
color:#222;
}

.score{

font-size:60px;
font-weight:bold;
color:#28a745;

margin:25px 0;

}

#mention{

margin-bottom:15px;
color:#0056b3;

}

.message{

font-size:20px;
line-height:1.6;

margin-bottom:25px;

}

/* Zone des actions */

#actions{

margin-top:20px;
margin-bottom:25px;

text-align:center;

}

#actions a{

text-decoration:none;

}

#actions button{

display:inline-block;

margin:10px;

}

/* Boutons */

button{

padding:15px 35px;

background:#0056b3;

color:#fff;

border:none;

border-radius:8px;

cursor:pointer;

font-size:18px;

transition:.3s;

}

button:hover{

background:#003d80;

}

/* Footer */

.footer{

margin-top:50px;

background:linear-gradient(135deg,#0d47a1,#1565c0);

color:white;

text-align:center;

padding:30px 15px;

border-top:4px solid #ffc107;

}

.footer-content h3{

margin-bottom:15px;

font-size:22px;

}

.footer-content p{

margin:8px 0;

font-size:16px;

line-height:1.6;

}

.footer-content a{

color:#ffd54f;

text-decoration:none;

font-weight:bold;

}

.footer-content a:hover{

text-decoration:underline;

}

.copyright{

margin-top:15px;

font-size:14px;

opacity:.9;

}

/* Responsive */

@media(max-width:768px){

.box{

width:95%;

padding:25px 20px;

}

h1{

font-size:28px;

}

#nom{

font-size:22px;

}

.score{

font-size:45px;

}

#mention{

font-size:24px;

}

.message{

font-size:18px;

}

button{

width:100%;

font-size:18px;

margin-top:15px;

}

#actions button{

width:100%;

}

.footer-content h3{

font-size:20px;

}

.footer-content p{

font-size:15px;

}

}

</style>

</head>

<body>

<div class="box">

<h1>Résultat du Concours</h1>

<h2 id="nom"></h2>

<div class="score" id="score"></div>

<h2 id="mention"></h2>

<p class="message" id="message"></p>

<!-- Les boutons générés par resultat.js apparaîtront ici -->
<div id="actions"></div>

<button onclick="terminer()">
Terminer
</button>

</div>

<footer class="footer">

<div class="footer-content">

<h3>Plateforme d'Évaluation en Ligne - ADETIC Abéché</h3>

</p>

</div>

</footer>

<script src="js/resultat.js"></script>

</body>

</html>
