body{

background:#f2f5fa;

.box{

background:white;

width:700px;

max-width:95%;

margin:40px auto;

padding:40px;

border-radius:15px;

border-radius:8px;

margin-top:30px;

}

button:hover{

background:#003d80;

}

.footer{
    margin-top:50px;
    background:linear-gradient(135deg,#0d47a1,#1565c0);

    text-align:center;
    padding:25px 15px;

}

.footer-content h3{
    margin-bottom:12px;
    font-size:20px;
    font-weight:bold;
}

.footer-content p{
    margin:8px 0;
    font-size:15px;
    line-height:1.6;
}

.footer-content a{
    color:#ffd54f;
    text-decoration:none;
    font-weight:bold;
}

.footer-content a:hover{
    text-decoration:underline;
}

.copyright{
    margin-top:15px;
    font-size:13px;

}
